<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, viewport-fit=cover"
		/>
		<title>Terminal GUI</title>

		<!-- PWA meta tags -->
		<meta name="theme-color" content="#09090b" />
		<meta name="color-scheme" content="dark" />
		<meta
			name="description"
			content="Terminal GUI — a multi-pane terminal manager"
		/>
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta
			name="apple-mobile-web-app-status-bar-style"
			content="black-translucent"
		/>
		<meta name="apple-mobile-web-app-title" content="Terminal GUI" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<style>
			@import url("/styles.css");
		</style>
		<script>
			// Apply saved app theme before first paint to prevent flash
			(function () {
				try {
					var id = localStorage.getItem("surgent-app-theme-id");
					if (!id || id === "default") return;
					var colors = null,
						light = false;
					if (id === "custom") {
						var c = localStorage.getItem("surgent-app-custom-theme");
						if (c) {
							colors = JSON.parse(c);
							var bg = colors.bg;
							if (bg) {
								var n = parseInt(bg.replace("#", ""), 16);
								light =
									(((n >> 16) & 255) * 299 +
										((n >> 8) & 255) * 587 +
										(n & 255) * 114) /
										1000 >
									128;
							}
						}
					} else {
						var presets = {
							nord: {
								bg: "#2e3440",
								surface: "#3b4252",
								surface2: "#434c5e",
								surface3: "#4c566a",
								border: "rgba(216,222,233,0.08)",
								borderBold: "rgba(216,222,233,0.15)",
								accent: "#88c0d0",
								accentHover: "#8fbcbb",
								success: "#a3be8c",
								warning: "#ebcb8b",
								error: "#bf616a",
								info: "#81a1c1",
								text: "#eceff4",
								text2: "rgba(216,222,233,0.60)",
								text3: "rgba(216,222,233,0.35)",
							},
							dracula: {
								bg: "#282a36",
								surface: "#343746",
								surface2: "#3e4155",
								surface3: "#4a4d64",
								border: "rgba(248,248,242,0.08)",
								borderBold: "rgba(248,248,242,0.15)",
								accent: "#bd93f9",
								accentHover: "#caa9fa",
								success: "#50fa7b",
								warning: "#f1fa8c",
								error: "#ff5555",
								info: "#8be9fd",
								text: "#f8f8f2",
								text2: "rgba(248,248,242,0.55)",
								text3: "rgba(248,248,242,0.30)",
							},
							solarized: {
								bg: "#002b36",
								surface: "#073642",
								surface2: "#0e3e4a",
								surface3: "#174652",
								border: "rgba(131,148,150,0.10)",
								borderBold: "rgba(131,148,150,0.18)",
								accent: "#268bd2",
								accentHover: "#2aa1f0",
								success: "#859900",
								warning: "#b58900",
								error: "#dc322f",
								info: "#2aa198",
								text: "#fdf6e3",
								text2: "rgba(147,161,161,0.70)",
								text3: "rgba(147,161,161,0.40)",
							},
							monokai: {
								bg: "#272822",
								surface: "#2e2f28",
								surface2: "#383930",
								surface3: "#44453a",
								border: "rgba(248,248,242,0.08)",
								borderBold: "rgba(248,248,242,0.15)",
								accent: "#a6e22e",
								accentHover: "#b8f340",
								success: "#a6e22e",
								warning: "#e6db74",
								error: "#f92672",
								info: "#66d9ef",
								text: "#f8f8f2",
								text2: "rgba(248,248,242,0.55)",
								text3: "rgba(248,248,242,0.30)",
							},
							github: {
								bg: "#0d1117",
								surface: "#161b22",
								surface2: "#1c2129",
								surface3: "#262c36",
								border: "rgba(240,246,252,0.06)",
								borderBold: "rgba(240,246,252,0.12)",
								accent: "#58a6ff",
								accentHover: "#79c0ff",
								success: "#3fb950",
								warning: "#d29922",
								error: "#f85149",
								info: "#58a6ff",
								text: "#f0f6fc",
								text2: "rgba(201,209,217,0.60)",
								text3: "rgba(201,209,217,0.35)",
							},
							ocean: {
								bg: "#0d1b2a",
								surface: "#1b2838",
								surface2: "#243447",
								surface3: "#2d4056",
								border: "rgba(180,220,255,0.08)",
								borderBold: "rgba(180,220,255,0.14)",
								accent: "#00b4d8",
								accentHover: "#48cae4",
								success: "#06d6a0",
								warning: "#ffd166",
								error: "#ef476f",
								info: "#48cae4",
								text: "#edf6f9",
								text2: "rgba(200,225,240,0.55)",
								text3: "rgba(200,225,240,0.30)",
							},
							rose: {
								bg: "#191724",
								surface: "#1f1d2e",
								surface2: "#26233a",
								surface3: "#2e2b40",
								border: "rgba(224,222,244,0.08)",
								borderBold: "rgba(224,222,244,0.15)",
								accent: "#c4a7e7",
								accentHover: "#d4bdf7",
								success: "#9ccfd8",
								warning: "#f6c177",
								error: "#eb6f92",
								info: "#9ccfd8",
								text: "#e0def4",
								text2: "rgba(224,222,244,0.55)",
								text3: "rgba(224,222,244,0.30)",
							},
							light: {
								bg: "#f5f5f7",
								surface: "#ffffff",
								surface2: "#e8e8ed",
								surface3: "#d1d1d6",
								border: "rgba(0,0,0,0.10)",
								borderBold: "rgba(0,0,0,0.18)",
								accent: "#007AFF",
								accentHover: "#0A84FF",
								success: "#28a745",
								warning: "#e69500",
								error: "#dc3545",
								info: "#0a84ff",
								text: "#1c1c1e",
								text2: "rgba(0,0,0,0.55)",
								text3: "rgba(0,0,0,0.30)",
							},
							githubLight: {
								bg: "#ffffff",
								surface: "#f6f8fa",
								surface2: "#e1e4e8",
								surface3: "#d0d7de",
								border: "rgba(0,0,0,0.08)",
								borderBold: "rgba(0,0,0,0.14)",
								accent: "#0969da",
								accentHover: "#0550ae",
								success: "#1a7f37",
								warning: "#bf8700",
								error: "#cf222e",
								info: "#0969da",
								text: "#1f2328",
								text2: "rgba(0,0,0,0.55)",
								text3: "rgba(0,0,0,0.30)",
							},
							solarizedLight: {
								bg: "#fdf6e3",
								surface: "#eee8d5",
								surface2: "#e0dac7",
								surface3: "#d3ccb9",
								border: "rgba(0,0,0,0.08)",
								borderBold: "rgba(0,0,0,0.15)",
								accent: "#268bd2",
								accentHover: "#2aa1f0",
								success: "#859900",
								warning: "#b58900",
								error: "#dc322f",
								info: "#2aa198",
								text: "#073642",
								text2: "rgba(7,54,66,0.65)",
								text3: "rgba(7,54,66,0.40)",
							},
						};
						var lightIds = { light: 1, githubLight: 1, solarizedLight: 1 };
						colors = presets[id];
						light = !!lightIds[id];
					}
					if (!colors) return;
					var map = {
						bg: "--color-surgent-bg",
						surface: "--color-surgent-surface",
						surface2: "--color-surgent-surface-2",
						surface3: "--color-surgent-surface-3",
						border: "--color-surgent-border",
						borderBold: "--color-surgent-border-bold",
						accent: "--color-surgent-accent",
						accentHover: "--color-surgent-accent-hover",
						success: "--color-surgent-success",
						warning: "--color-surgent-warning",
						error: "--color-surgent-error",
						info: "--color-surgent-info",
						text: "--color-surgent-text",
						text2: "--color-surgent-text-2",
						text3: "--color-surgent-text-3",
					};
					var r = document.documentElement;
					for (var k in map) {
						if (colors[k]) r.style.setProperty(map[k], colors[k]);
					}
					r.style.colorScheme = light ? "light" : "dark";
					if (colors.bg) {
						var m = document.querySelector('meta[name="theme-color"]');
						if (m) m.setAttribute("content", colors.bg);
					}
				} catch (e) {}
			})();
		</script>
	</head>
	<body
		class="bg-surgent-bg text-surgent-text antialiased"
		style="
			font-family:
				&quot;Geist&quot;,
				-apple-system,
				BlinkMacSystemFont,
				system-ui,
				sans-serif;
		"
	>
		<script>
			// Fix Bun HMR bug: check readyState before WebSocket.send()
			// https://github.com/oven-sh/bun/issues - InvalidStateError on server restart
			(function () {
				var orig = WebSocket.prototype.send;
				WebSocket.prototype.send = function (data) {
					if (this.readyState === 1) orig.call(this, data);
				};
			})();
		</script>
		<div id="root">
			<div
				style="
					display: flex;
					align-items: center;
					justify-content: center;
					height: 100vh;
					width: 100vw;
				"
			>
				<style>
					@keyframes tg-spin {
						to {
							transform: rotate(360deg);
						}
					}
				</style>
				<svg
					width="32"
					height="32"
					viewBox="0 0 24 24"
					fill="none"
					style="animation: tg-spin 0.8s linear infinite"
				>
					<circle
						cx="12"
						cy="12"
						r="10"
						stroke="rgba(255,255,255,0.1)"
						stroke-width="3"
					/>
					<path
						d="M12 2a10 10 0 0 1 10 10"
						stroke="rgba(255,255,255,0.5)"
						stroke-width="3"
						stroke-linecap="round"
					/>
				</svg>
			</div>
		</div>
		<script type="module" src="./src/main.tsx"></script>
	</body>
</html>
